defaults:
  - ../../src_rl/examples/config/deepspeed_zero@_here_
  - ../../src_rl/examples/config/deepspeed_zero2@_here_
  - ../../src_rl/examples/config/deepspeed_zero3@_here_
  - ../../src_rl/examples/config/deepspeed_zero3_cpuoffload@_here_

hydra:
  run:
    dir: .
  output_subdir: null

exp_name: "qwen_edit_think_rlvr"
seed: 42
logging_dir: /tmp/
output_dir: /tmp/

checkpoint_config:
  type: file_system
  output_dir: /tmp/

track_with: tensorboard
tracker_kwargs:
  log_dir: /tmp/

save_steps: 20
logging_steps: 1
eval_steps: 10
resume_from_checkpoint: false

rollout_batch_size: 2
num_return_sequences_in_group: 2
is_num_return_sequences_expand: true
prompt_length: 2048
response_length: 256

ppo_epochs: 1
value_clip: 0.5
reward_clip: 10
advantage_clip: 10.0
whiten_advantages: false
init_kl_coef: 0.0
adv_estimator: "grpo"
use_kl_loss: true
kl_loss_coef: 1.0e-2

pretrain: /checkpoints/Qwen2.5-VL-7B-Instruct/

actor_train:
  model_args:
    flash_attn: fa2
    attn_implementation: fa2
    disable_gradient_checkpointing: false
    dtype: bf16
    model_type: ~
  training_args:
    learning_rate: 1.0e-6
    weight_decay: 1.0e-2
    per_device_train_batch_size: 2
    gradient_accumulation_steps: 2
    warmup_steps: 0
    num_train_epochs: 50
  data_args:
    file_name:
      - /json_file_4_train/rlvr_reason_edit_34k.jsonl
    domain_interleave_probs:
      reason_edit: 1.0

    dataset_dir: ./
    messages: prompt
    preprocessing_num_workers: 32
  strategy_args:
    strategy_name: megatron_train
    strategy_config:
      tensor_model_parallel_size: 1
      pipeline_model_parallel_size: 1
      expert_model_parallel_size: 1
      use_distributed_optimizer: true
      recompute_granularity: full
      bf16: true
  device_mapping: list(range(0, 1))
  infer_batch_size: 1

actor_infer:
  model_args:
    flash_attn: fa2
    attn_implementation: fa2
    disable_gradient_checkpointing: true
    dtype: bf16
  generating_args:
    max_new_tokens: ${response_length}
    top_p: 0.99
    top_k: 100
    num_beams: 1
    temperature: 0.99
    num_return_sequences: ${num_return_sequences_in_group}
  strategy_args:
    strategy_name: vllm
    strategy_config:
      gpu_memory_utilization: 0.9
      block_size: 16
  num_gpus_per_worker: 1
  device_mapping: list(range(0, 1))
  infer_batch_size: 1

reference:
  model_args:
    flash_attn: fa2
    attn_implementation: fa2
    disable_gradient_checkpointing: true
    dtype: bf16
    model_type: ~
  strategy_args:
    strategy_name: megatron_infer
    strategy_config:
      tensor_model_parallel_size: 1
      pipeline_model_parallel_size: 1
      expert_model_parallel_size: 1
      use_distributed_optimizer: true
      recompute_granularity: full
      bf16: true
  device_mapping: list(range(0, 1))
  infer_batch_size: 1

rewards:
  reason_edit:
    worker_cls: src_rl.rlvr_image_think.image_edit_reward_worker.ImageEditRewardWorker
    judge_model_type: inference

    editor_model_path: "/tmp//checkpoints/qwen_image_edit_think_experiments/qwen_image_edit_think_zero2_bs1024_lr1e_05_20251024_124721/ckpt/step-3000-merged"
    judge_model_path: "/tmp//checkpoints/Qwen2.5-VL-7B-Instruct/"

    model_args:
      #model_name_or_path: virtuoussy/Qwen2.5-7B-Instruct-RLVR
      attn_implementation: fa2
      disable_gradient_checkpointing: true
      dtype: bf16
      model_type: trl
    generating_args:
      max_new_tokens: 100
      top_p: 0.8
      top_k: 50
      num_beams: 1
      temperature: 0.8
      num_return_sequences: 1
    data_args:
      template: qwen2_5
    strategy_args:
      # strategy_name: hf_infer
      # strategy_config: null
      strategy_name: vllm
      strategy_config:
        gpu_memory_utilization: 0.8
        block_size: 16
        max_model_len: 8000
        load_format: auto
    device_mapping: list(range(1, 2))
    infer_batch_size: 1
     